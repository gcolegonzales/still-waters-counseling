<!doctype html>
<html><head><meta charset="utf-8"><title>measuring…</title></head>
<body style="margin:0">
<iframe id="f" style="width:390px;height:820px;border:0"></iframe>
<script>
  var f = document.getElementById('f');
  var v = String(performance.now()).replace('.', '');
  window.__ready = false;
  f.src = '/?m=' + v;
  f.onload = function(){
    try{
      var d = f.contentDocument;
      var link = d.querySelector('link[rel="stylesheet"]');
      if (link){ link.href = link.getAttribute('href').split('?')[0] + '?v=' + v; }
      setTimeout(function(){ window.__ready = true; document.title = 'READY'; }, 800);
    }catch(e){ document.title = 'ERR '+e.message; }
  };
</script>
</body></html>
